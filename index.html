<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --text-color: #ffffff;
            --accent-color: #ff2d8d;
            --accent-glow: rgba(255, 45, 141, 0.5);
            --secondary-text: #b0b0b0;
            --transition: all 0.3s ease;
        }

        
        [data-theme="light"] {
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
            --text-color: #1a1a1a;
            --secondary-text: #555555;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
            transition: var(--transition);
        }

        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            position: fixed;
            width: 100%;
            top: 0;
            background: var(--bg-color);
            z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-color);
            font-weight: 500;
            transition: var(--transition);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent-color);
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 1.2rem;
            margin-left: 20px;
        }

        
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10%;
            margin-top: 60px;
        }

        .hero-content { flex: 1; }
        .hero-image { 
            flex: 1; 
            display: flex; 
            justify-content: center; 
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .hero h1 span { color: var(--accent-color); }

        .hero p {
            color: var(--secondary-text);
            max-width: 500px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            background: var(--accent-color);
            color: white;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: var(--transition);
        }

        .btn:hover { transform: scale(1.05); }

        .profile-img-container {
            width: 350px;
            height: 350px;
            border-radius: 50%;
            border: 4px solid var(--accent-color);
            box-shadow: 0 0 30px var(--accent-glow);
            overflow: hidden;
        }

        .profile-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        
        .counters {
            display: flex;
            justify-content: space-around;
            padding: 50px 10%;
            background: var(--card-bg);
        }

        .counter-item { text-align: center; }
        .counter-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-color);
            display: block;
        }

       
        section { padding: 80px 10%; }
        .section-title {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 50px;
        }
        .section-title span { color: var(--accent-color); }

        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }

        .skill-group h3 { margin-bottom: 20px; color: var(--accent-color); }

        .skill-bar-item { margin-bottom: 15px; }
        .skill-info { display: flex; justify-content: space-between; margin-bottom: 5px; }

        .progress-line {
            height: 10px;
            width: 100%;
            background: #333;
            border-radius: 10px;
            position: relative;
        }

        .progress-line span {
            height: 100%;
            background: var(--accent-color);
            position: absolute;
            border-radius: 10px;
            box-shadow: 0 0 10px var(--accent-glow);
            width: 0;
            transition: width 1.5s ease-in-out;
        }

        
        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .project-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: var(--transition);
        }

        .project-card:hover {
            border-color: var(--accent-color);
            transform: translateY(-5px);
        }

        
        .contact-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-group { margin-bottom: 20px; }
        input, textarea {
            width: 100%;
            padding: 15px;
            background: var(--card-bg);
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
        }
        
       
        @media (max-width: 768px) {
            .hero { flex-direction: column-reverse; text-align: center; height: auto; padding-top: 100px; }
            .hero h1 { font-size: 2.5rem; }
            .profile-img-container { width: 250px; height: 250px; margin-bottom: 30px; }
            .nav-links { display: none; } 
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo" id="nav-logo">PORTFOLIO</div>
        <ul class="nav-links">
            <li><a href="#home" class="active">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#certificates">Certificates</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-moon" id="theme-icon"></i>
        </div>
    </nav>

    <section class="hero" id="home">
        <div class="hero-content">
            <h1 id="hero-name">Hi, I'm <span>Anesu</span></h1>
            <p id="hero-bio">University student & Aspiring Developer.</p>
            <div class="social-icons" id="hero-socials"></div>
            <br>
            <a href="#contact" class="btn">Get In Touch</a>
        </div>
        <div class="hero-image">
            <div class="profile-img-container">
                <img src="crazy.jpeg" id="main-profile-pic" alt="Profile">
            </div>
        </div>
    </section>

    <div class="counters">
        <div class="counter-item">
            <span class="counter-number" data-target="10">0</span>
            <p>Technical Compitencies</p>
        </div>
        <div class="counter-item">
            <span class="counter-number" data-target="3">0</span>
            <p>Certificates</p>
        </div>
        <div class="counter-item">
            <span class="counter-number" data-target="6">0</span>
            <p>Core Modules</p>
        </div>
    </div>

    <section id="about">
        <h2 class="section-title">About <span>Me</span></h2>
        <div style="text-align: center; max-width: 800px; margin: 0 auto;">
            <p id="about-text"></p>
        </div>
    </section>

    <section id="skills">
        <h2 class="section-title">Technical <span>Skills</span></h2>
        <div class="skills-container" id="skills-list"></div>
    </section>

    <section id="certificates">
        <h2 class="section-title">My <span>Certificates</span></h2>
        <div class="project-grid" id="project-list"></div>
    </section>

    <section id="contact">
        <h2 class="section-title">Contact <span>Me</span></h2>
        <div class="contact-container">
            <form id="contact-form">
                <div class="form-group"><input type="text" id="name" placeholder="Your Name" required></div>
                <div class="form-group"><input type="email" id="email" placeholder="Your Email" required></div>
                <div class="form-group"><textarea id="message" rows="5" placeholder="Your Message" required></textarea></div>
                <button type="submit" class="btn" style="width: 100%;">Send Message</button>
            </form>
        </div>
    </section>

    <script>
        
        const CONFIG = {
            name: "Oslea Anesu Mukuhlani",
            title: "Computer Science Student",
            profilePic: src="crazy.jpeg", 
            about: "I am a passionate student at Midlands State University focused on Cybersecurity, Web Development and Data Science. I bridge the gap between technical logic and creative aesthetics.",
            socials: [
                { icon: "fab fa-github", link: "https://github.com/Oslea125" },
                { icon: "fab fa-linkedin", link: "https://www.linkedin.com/in/oslea-mukuhlani-639a35308" },
                { icon: "fab fa-twitter", link: "https://twitter.com/Oslea15" },
                { icon: "fab fa-instagram", link: "https://www.instagram.com/_oslea_" }
            ],
            skills: [
                { name: "Python", percent: "45%" },
                { name: "JavaScript", percent: "25%" },
                { name: "Cybersecurity", percent: "25%" },
                { name: "HTML/CSS", percent: "25%" }
            ],
            projects: [
                {
                    title: "Introduction to Python",
                    desc: "CERTIFICATE OF ACCOMPLISHMENT.",
                    tech: "",
                    link: "https://www.datacamp.com/completed/statement-of-accomplishment/course/53117b934e9b4ce08d4ec383b32caffd47a5aff7?share=true"
                },
                {
                    title: "AI in cybersecurity",
                    desc: "Vulnerability, Intelligence, Security, and Ethics",
                    tech: "Issued March 2026",
                    link: "https://alison.com/verify/f78f5febe0"
                },
                {
                    title: "Fashion E-commerce",
                    desc: "Portfolio site for handmade satin accessories.",
                    tech: "HTML, CSS, JS",
                    link: "#"
                }
            ]
        };

        
        function initPortfolio() {
            document.getElementById('hero-name').innerHTML = `Hi, I'm <span>${CONFIG.name.split(' ')[1]}</span>`;
            document.getElementById('hero-bio').innerText = CONFIG.title;
            document.getElementById('about-text').innerText = CONFIG.about;
            document.getElementById('main-profile-pic').src = CONFIG.profilePic;

           
            const socialContainer = document.getElementById('hero-socials');
            CONFIG.socials.forEach(s => {
                socialContainer.innerHTML +=` <a href="${s.link}" style="color: white; margin-right: 15px; font-size: 1.5rem;"><i class="${s.icon}"></i></a>`;
            });

            
            const skillsList = document.getElementById('skills-list');
            CONFIG.skills.forEach(skill => {
                skillsList.innerHTML += `
                    <div class="skill-bar-item">
                        <div class="skill-info"><span>${skill.name}</span><span>${skill.percent}</span></div>
                        <div class="progress-line"><span style="width: ${skill.percent}"></span></div>
                    </div>`;
            });

            
            const projectList = document.getElementById('project-list');
            CONFIG.projects.forEach(p => {https://www.linkedin.com/in/oslea-mukuhlani-639a35308
                projectList.innerHTML += `
                    <div class="project-card">
                        <h3>${p.title}</h3>
                        <p style="font-size: 0.9rem; color: var(--secondary-text); margin: 10px 0;">${p.desc}</p>
                        <small><b>Tech:</b> ${p.tech}</small><br><br>
                        <a href="${p.link}" class="btn" style="padding: 5px 15px; font-size: 0.8rem;">View Certificate</a>
                    </div>`;
            });
        }

        
        function toggleTheme() {
            const body = document.body;
            const icon = document.getElementById('theme-icon');
            if (body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                icon.className = 'fas fa-moon';
                localStorage.setItem('theme', 'dark');
            } else {
                body.setAttribute('data-theme', 'light');
                icon.className = 'fas fa-sun';
                localStorage.setItem('theme', 'light');
            }
        }

        
        const counters = document.querySelectorAll('.counter-number');
        counters.forEach(counter => {
            const updateCount = () => {
                const target = +counter.getAttribute('data-target');
                const count = +counter.innerText;
                const speed = 200;
                const inc = target / speed;
                if (count < target) {
                    counter.innerText = Math.ceil(count + inc);
                    setTimeout(updateCount, 1);
                } else {
                    counter.innerText = target;
                }
            };
            updateCount();
        });

        
        document.getElementById('contact-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert("Thank you! Your message has been sent successfully.");
            e.target.reset();
        });

        window.onload = () => {
            initPortfolio();
            if(localStorage.getItem('theme') === 'light') toggleTheme();
        };
    </script>
</body>
</html>
